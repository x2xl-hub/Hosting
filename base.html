<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}SHAPPNO Vps — Pro Hosting Panel{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --bg:#070a16;
  --bg2:#0d1228;
  --panel:rgba(20,26,52,0.7);
  --panel-solid:#141a34;
  --border:rgba(120,140,220,0.15);
  --text:#e8ecff;
  --muted:#8892bf;
  --primary:#6366f1;
  --primary2:#8b5cf6;
  --accent:#06b6d4;
  --ok:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --grad2:linear-gradient(135deg,#06b6d4,#3b82f6);
}
html,body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body{
  background:
    radial-gradient(1200px 700px at 10% -10%, rgba(99,102,241,0.25), transparent 60%),
    radial-gradient(1000px 600px at 100% 0%, rgba(236,72,153,0.18), transparent 60%),
    radial-gradient(900px 500px at 50% 100%, rgba(6,182,212,0.15), transparent 60%),
    linear-gradient(180deg,#070a16,#0a0f24);
  background-attachment: fixed;
}
a{color:#a5b4fc;text-decoration:none}
a:hover{color:#c7d2fe}
.nav{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px;
  background:rgba(7,10,22,0.7);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.3px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:16px;box-shadow:0 6px 20px rgba(99,102,241,0.45)}
.nav-links{display:flex;gap:22px;align-items:center}
.nav-links a{color:#c7cce8;font-size:14px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:0;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:transform .15s, box-shadow .15s, filter .15s}
.btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(99,102,241,0.35)}
.btn-ghost{background:rgba(255,255,255,0.06);color:#e8ecff;border:1px solid var(--border)}
.btn-ok{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-warn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.wrap{max-width:1180px;margin:32px auto;padding:0 20px}
.card{background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 10px 40px rgba(0,0,0,0.25)}
.card + .card{margin-top:18px}
h1,h2,h3{margin:0 0 14px;font-weight:700}
h1{font-size:34px;letter-spacing:-0.5px}
h2{font-size:20px}
h3{font-size:16px}
input,select,textarea{
  padding:11px 13px;border-radius:10px;border:1px solid var(--border);
  background:rgba(10,14,32,0.7);color:var(--text);font-size:14px;font-family:inherit;
  transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.2)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row > input{flex:1;min-width:130px}
.muted{color:var(--muted);font-size:13px}
.footer{text-align:center;padding:30px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
.gradient-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.badge-on{background:rgba(16,185,129,0.18);color:#6ee7b7;border:1px solid rgba(16,185,129,0.35)}
.badge-off{background:rgba(239,68,68,0.18);color:#fca5a5;border:1px solid rgba(239,68,68,0.35)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
form.inline{display:inline}
code{background:rgba(99,102,241,0.12);color:#c7d2fe;padding:2px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float{animation:float 4s ease-in-out infinite}
</style>
{% block head %}{% endblock %}
</head><body>
<nav class="nav">
  <a href="/" class="brand"><span class="logo">⚡</span><span>Cloud<span class="gradient-text">VPS</span></span></a>
  <div class="nav-links">
    <a href="/home">Home</a>
    <a href="/pricing">Pricing</a>
    {% if session.username %}
      <span class="muted">{{session.username}}</span>
      <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
    {% else %}
      <a href="/login" class="btn btn-primary btn-sm">Login</a>
    {% endif %}
  </div>
</nav>
{% block body %}{% endblock %}
<div class="footer">© CloudVPS — Powered by Railway · Built for developers</div>
</body></html>
